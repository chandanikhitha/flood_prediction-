<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction</title>

    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin-top: 100px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>Flood Prediction</h2>

        <form action="/predict" method="post">
            <input type="text" name="rainfall" placeholder="Enter Rainfall" required><br>
            <input type="text" name="temperature" placeholder="Enter Temperature" required><br>

            <button type="submit">Predict</button>
        </form>
    </div>

</body>
</html>
